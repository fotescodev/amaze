<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="av-body-glow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="#1a1a2e" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0f3460" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="av-inner-glow" cx="50%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <filter id="av-glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <style>
    @keyframes av-pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.6; }
    }
    .av-glow-ring { animation: av-pulse 2.5s ease-in-out infinite; }
  </style>
  <!-- Ambient glow behind body -->
  <ellipse cx="32" cy="28" rx="16" ry="14" fill="#f59e0b" opacity="0.08" filter="url(#av-glow)"/>
  <!-- Sound wave arcs -->
  <path d="M18 18 Q14 24 18 30" fill="none" stroke="#f59e0b" stroke-width="0.8" opacity="0.3" class="av-glow-ring"/>
  <path d="M46 18 Q50 24 46 30" fill="none" stroke="#f59e0b" stroke-width="0.8" opacity="0.3" class="av-glow-ring" style="animation-delay: 0.4s"/>
  <path d="M15 16 Q10 24 15 32" fill="none" stroke="#fbbf24" stroke-width="0.6" opacity="0.2" class="av-glow-ring" style="animation-delay: 0.8s"/>
  <path d="M49 16 Q54 24 49 32" fill="none" stroke="#fbbf24" stroke-width="0.6" opacity="0.2" class="av-glow-ring" style="animation-delay: 1.2s"/>
  <!-- Main body (spherical carapace) -->
  <ellipse cx="32" cy="26" rx="14" ry="12" fill="url(#av-body-glow)" stroke="#0f3460" stroke-width="0.8"/>
  <!-- Carapace texture lines -->
  <path d="M22 22 Q32 18 42 22" fill="none" stroke="#16213e" stroke-width="0.5" opacity="0.6"/>
  <path d="M20 27 Q32 23 44 27" fill="none" stroke="#16213e" stroke-width="0.5" opacity="0.5"/>
  <path d="M22 31 Q32 28 42 31" fill="none" stroke="#16213e" stroke-width="0.4" opacity="0.4"/>
  <!-- Inner warm glow (communication) -->
  <ellipse cx="32" cy="25" rx="7" ry="6" fill="url(#av-inner-glow)" class="av-glow-ring"/>
  <!-- Five legs -->
  <!-- Leg 1 - front left -->
  <path d="M23 34 L16 48 L14 46" fill="none" stroke="#1a1a2e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="14" cy="46" r="1.2" fill="#16213e"/>
  <!-- Leg 2 - front right -->
  <path d="M41 34 L48 48 L50 46" fill="none" stroke="#1a1a2e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="50" cy="46" r="1.2" fill="#16213e"/>
  <!-- Leg 3 - mid left -->
  <path d="M20 32 L10 44 L8 43" fill="none" stroke="#1a1a2e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="8" cy="43" r="1.2" fill="#16213e"/>
  <!-- Leg 4 - mid right -->
  <path d="M44 32 L54 44 L56 43" fill="none" stroke="#1a1a2e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="56" cy="43" r="1.2" fill="#16213e"/>
  <!-- Leg 5 - center bottom -->
  <path d="M32 36 L32 50 L33 48" fill="none" stroke="#1a1a2e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="32" cy="50" r="1.2" fill="#16213e"/>
  <!-- Subtle teal engineering accents on body -->
  <ellipse cx="32" cy="26" rx="14" ry="12" fill="none" stroke="#0d9488" stroke-width="0.3" stroke-dasharray="2 4" opacity="0.4"/>
</svg>
