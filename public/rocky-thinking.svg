<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <radialGradient id="th-body" cx="50%" cy="42%" r="50%">
      <stop offset="0%" stop-color="#2a1a3e"/>
      <stop offset="40%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </radialGradient>
    <radialGradient id="th-core" cx="50%" cy="48%" r="40%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#f59e0b" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <filter id="th-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <style>
    @keyframes th-pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.65; } }
    @keyframes th-wave-out {
      0% { r: 18; opacity: 0.5; }
      100% { r: 34; opacity: 0; }
    }
    @keyframes th-dot1 { 0%, 20% { opacity: 0.2; } 25%, 45% { opacity: 0.9; } 50%, 100% { opacity: 0.2; } }
    @keyframes th-dot2 { 0%, 35% { opacity: 0.2; } 40%, 60% { opacity: 0.9; } 65%, 100% { opacity: 0.2; } }
    @keyframes th-dot3 { 0%, 50% { opacity: 0.2; } 55%, 75% { opacity: 0.9; } 80%, 100% { opacity: 0.2; } }
    .th-core-glow { animation: th-pulse 2s ease-in-out infinite; }
    .th-ring { animation: th-wave-out 2s ease-out infinite; transform-origin: 40px 30px; }
    .th-ring-2 { animation: th-wave-out 2s ease-out infinite 0.7s; transform-origin: 40px 30px; }
    .th-ring-3 { animation: th-wave-out 2s ease-out infinite 1.4s; transform-origin: 40px 30px; }
    .th-d1 { animation: th-dot1 1.8s ease-in-out infinite; }
    .th-d2 { animation: th-dot2 1.8s ease-in-out infinite; }
    .th-d3 { animation: th-dot3 1.8s ease-in-out infinite; }
  </style>

  <!-- Ambient glow -->
  <ellipse cx="40" cy="30" rx="22" ry="18" fill="#f59e0b" opacity="0.06" filter="url(#th-glow)"/>

  <!-- Expanding sonar rings (thinking/processing) -->
  <circle cx="40" cy="30" r="18" fill="none" stroke="#f59e0b" stroke-width="1" class="th-ring"/>
  <circle cx="40" cy="30" r="18" fill="none" stroke="#fbbf24" stroke-width="0.8" class="th-ring-2"/>
  <circle cx="40" cy="30" r="18" fill="none" stroke="#fbbf24" stroke-width="0.6" class="th-ring-3"/>

  <!-- Main body -->
  <ellipse cx="40" cy="30" rx="16" ry="14" fill="url(#th-body)" stroke="#0f3460" stroke-width="0.8"/>

  <!-- Carapace texture -->
  <path d="M28 26 Q40 22 52 26" fill="none" stroke="#16213e" stroke-width="0.5" opacity="0.5"/>
  <path d="M26 31 Q40 27 54 31" fill="none" stroke="#16213e" stroke-width="0.5" opacity="0.4"/>
  <path d="M28 35 Q40 32 52 35" fill="none" stroke="#16213e" stroke-width="0.4" opacity="0.3"/>

  <!-- Inner glow - core (brighter when thinking) -->
  <ellipse cx="40" cy="29" rx="8" ry="7" fill="url(#th-core)" class="th-core-glow" filter="url(#th-glow)"/>

  <!-- Teal accent -->
  <ellipse cx="40" cy="30" rx="16" ry="14" fill="none" stroke="#0d9488" stroke-width="0.3" stroke-dasharray="2 4" opacity="0.3"/>

  <!-- Five legs - slightly curled inward (contemplative pose) -->
  <!-- Leg 1 - left -->
  <path d="M27 38 L18 52 L16 50" fill="none" stroke="#1a1a2e" stroke-width="2.2" stroke-linecap="round"/>
  <circle cx="16" cy="50" r="1.3" fill="#16213e"/>
  <!-- Leg 2 - mid-left -->
  <path d="M22 36 L12 48 L10 47" fill="none" stroke="#1a1a2e" stroke-width="2.2" stroke-linecap="round"/>
  <circle cx="10" cy="47" r="1.3" fill="#16213e"/>
  <!-- Leg 3 - center -->
  <path d="M40 42 L40 56 L41 54" fill="none" stroke="#1a1a2e" stroke-width="2.2" stroke-linecap="round"/>
  <circle cx="40" cy="56" r="1.3" fill="#16213e"/>
  <!-- Leg 4 - mid-right -->
  <path d="M58 36 L68 48 L70 47" fill="none" stroke="#1a1a2e" stroke-width="2.2" stroke-linecap="round"/>
  <circle cx="70" cy="47" r="1.3" fill="#16213e"/>
  <!-- Leg 5 - right -->
  <path d="M53 38 L62 52 L64 50" fill="none" stroke="#1a1a2e" stroke-width="2.2" stroke-linecap="round"/>
  <circle cx="64" cy="50" r="1.3" fill="#16213e"/>

  <!-- Thinking dots (floating above) -->
  <circle cx="54" cy="12" r="2" fill="#f59e0b" class="th-d1"/>
  <circle cx="60" cy="8" r="2.3" fill="#fbbf24" class="th-d2"/>
  <circle cx="67" cy="5" r="2.8" fill="#fb923c" class="th-d3"/>
</svg>
