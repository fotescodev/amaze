<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 100" width="600" height="100" preserveAspectRatio="none">
  <defs>
    <linearGradient id="eg-fade-left" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0"/>
      <stop offset="30%" stop-color="#f59e0b" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#fbbf24" stop-opacity="0.5"/>
      <stop offset="70%" stop-color="#f59e0b" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="eg-teal-fade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d9488" stop-opacity="0"/>
      <stop offset="30%" stop-color="#0d9488" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#0d9488" stop-opacity="0.4"/>
      <stop offset="70%" stop-color="#0d9488" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0d9488" stop-opacity="0"/>
    </linearGradient>
    <filter id="eg-glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <style>
    @keyframes eg-shimmer {
      0% { opacity: 0.15; }
      50% { opacity: 0.4; }
      100% { opacity: 0.15; }
    }
    .eg-glyph { font-family: 'Segoe UI Symbol', 'Apple Symbols', sans-serif; }
    .eg-s1 { animation: eg-shimmer 4s ease-in-out infinite; }
    .eg-s2 { animation: eg-shimmer 4s ease-in-out infinite 0.5s; }
    .eg-s3 { animation: eg-shimmer 4s ease-in-out infinite 1s; }
    .eg-s4 { animation: eg-shimmer 4s ease-in-out infinite 1.5s; }
    .eg-s5 { animation: eg-shimmer 4s ease-in-out infinite 2s; }
    .eg-s6 { animation: eg-shimmer 4s ease-in-out infinite 2.5s; }
    .eg-s7 { animation: eg-shimmer 4s ease-in-out infinite 3s; }
    .eg-s8 { animation: eg-shimmer 4s ease-in-out infinite 3.5s; }
  </style>

  <!-- Top line -->
  <line x1="40" y1="15" x2="560" y2="15" stroke="url(#eg-fade-left)" stroke-width="0.5"/>

  <!-- Bottom line -->
  <line x1="40" y1="85" x2="560" y2="85" stroke="url(#eg-fade-left)" stroke-width="0.5"/>

  <!-- Center decorative line -->
  <line x1="20" y1="50" x2="580" y2="50" stroke="url(#eg-teal-fade)" stroke-width="0.3"/>

  <!-- Eridian glyphs arranged as border pattern -->
  <!-- Group 1 - left cluster -->
  <text x="60" y="38" class="eg-glyph eg-s1" fill="#f59e0b" font-size="14" text-anchor="middle" opacity="0.3">&#x25C8;</text>
  <text x="60" y="72" class="eg-glyph eg-s1" fill="#f59e0b" font-size="14" text-anchor="middle" opacity="0.3">&#x25C8;</text>
  <text x="80" y="54" class="eg-glyph eg-s1" fill="#0d9488" font-size="10" text-anchor="middle" opacity="0.25">&#x2295;</text>

  <!-- Group 2 -->
  <text x="120" y="38" class="eg-glyph eg-s2" fill="#fbbf24" font-size="12" text-anchor="middle" opacity="0.3">&#x25C9;</text>
  <text x="135" y="54" class="eg-glyph eg-s2" fill="#f59e0b" font-size="16" text-anchor="middle" opacity="0.25">&#x2726;</text>
  <text x="120" y="72" class="eg-glyph eg-s2" fill="#fbbf24" font-size="12" text-anchor="middle" opacity="0.3">&#x25C9;</text>

  <!-- Group 3 -->
  <text x="175" y="35" class="eg-glyph eg-s3" fill="#0d9488" font-size="10" text-anchor="middle" opacity="0.2">&#x2295;</text>
  <text x="190" y="54" class="eg-glyph eg-s3" fill="#f59e0b" font-size="18" text-anchor="middle" opacity="0.35" filter="url(#eg-glow)">&#x25C8;</text>
  <text x="175" y="74" class="eg-glyph eg-s3" fill="#0d9488" font-size="10" text-anchor="middle" opacity="0.2">&#x2295;</text>

  <!-- Group 4 - center (prominent) -->
  <text x="240" y="40" class="eg-glyph eg-s4" fill="#fbbf24" font-size="14" text-anchor="middle" opacity="0.35">&#x2726;</text>
  <text x="260" y="54" class="eg-glyph eg-s4" fill="#f59e0b" font-size="10" text-anchor="middle" opacity="0.25">&#x25C9;</text>
  <text x="240" y="70" class="eg-glyph eg-s4" fill="#fbbf24" font-size="14" text-anchor="middle" opacity="0.35">&#x2726;</text>

  <!-- Center diamond -->
  <text x="300" y="56" class="eg-glyph eg-s5" fill="#fbbf24" font-size="22" text-anchor="middle" opacity="0.4" filter="url(#eg-glow)">&#x25C8;</text>
  <text x="300" y="30" class="eg-glyph eg-s5" fill="#0d9488" font-size="8" text-anchor="middle" opacity="0.25">&#x2295;</text>
  <text x="300" y="82" class="eg-glyph eg-s5" fill="#0d9488" font-size="8" text-anchor="middle" opacity="0.25">&#x2295;</text>

  <!-- Group 5 - right of center (mirror of group 4) -->
  <text x="360" y="40" class="eg-glyph eg-s6" fill="#fbbf24" font-size="14" text-anchor="middle" opacity="0.35">&#x2726;</text>
  <text x="340" y="54" class="eg-glyph eg-s6" fill="#f59e0b" font-size="10" text-anchor="middle" opacity="0.25">&#x25C9;</text>
  <text x="360" y="70" class="eg-glyph eg-s6" fill="#fbbf24" font-size="14" text-anchor="middle" opacity="0.35">&#x2726;</text>

  <!-- Group 6 -->
  <text x="410" y="54" class="eg-glyph eg-s6" fill="#f59e0b" font-size="18" text-anchor="middle" opacity="0.35" filter="url(#eg-glow)">&#x25C8;</text>
  <text x="425" y="35" class="eg-glyph eg-s6" fill="#0d9488" font-size="10" text-anchor="middle" opacity="0.2">&#x2295;</text>
  <text x="425" y="74" class="eg-glyph eg-s6" fill="#0d9488" font-size="10" text-anchor="middle" opacity="0.2">&#x2295;</text>

  <!-- Group 7 -->
  <text x="480" y="38" class="eg-glyph eg-s7" fill="#fbbf24" font-size="12" text-anchor="middle" opacity="0.3">&#x25C9;</text>
  <text x="465" y="54" class="eg-glyph eg-s7" fill="#f59e0b" font-size="16" text-anchor="middle" opacity="0.25">&#x2726;</text>
  <text x="480" y="72" class="eg-glyph eg-s7" fill="#fbbf24" font-size="12" text-anchor="middle" opacity="0.3">&#x25C9;</text>

  <!-- Group 8 - right cluster -->
  <text x="540" y="38" class="eg-glyph eg-s8" fill="#f59e0b" font-size="14" text-anchor="middle" opacity="0.3">&#x25C8;</text>
  <text x="540" y="72" class="eg-glyph eg-s8" fill="#f59e0b" font-size="14" text-anchor="middle" opacity="0.3">&#x25C8;</text>
  <text x="520" y="54" class="eg-glyph eg-s8" fill="#0d9488" font-size="10" text-anchor="middle" opacity="0.25">&#x2295;</text>

  <!-- Connecting dots between groups -->
  <circle cx="100" cy="50" r="1" fill="#f59e0b" opacity="0.2"/>
  <circle cx="155" cy="50" r="1" fill="#f59e0b" opacity="0.2"/>
  <circle cx="215" cy="50" r="1" fill="#f59e0b" opacity="0.2"/>
  <circle cx="280" cy="50" r="1" fill="#fbbf24" opacity="0.25"/>
  <circle cx="320" cy="50" r="1" fill="#fbbf24" opacity="0.25"/>
  <circle cx="385" cy="50" r="1" fill="#f59e0b" opacity="0.2"/>
  <circle cx="445" cy="50" r="1" fill="#f59e0b" opacity="0.2"/>
  <circle cx="500" cy="50" r="1" fill="#f59e0b" opacity="0.2"/>
</svg>
