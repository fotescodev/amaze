<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 350" width="400" height="350">
  <defs>
    <radialGradient id="hero-body" cx="50%" cy="42%" r="50%">
      <stop offset="0%" stop-color="#2a1a3e"/>
      <stop offset="40%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </radialGradient>
    <radialGradient id="hero-core-glow" cx="50%" cy="48%" r="40%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#f59e0b" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hero-ambient" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hero-leg-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <filter id="hero-soft-glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="hero-outer-glow">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <clipPath id="hero-body-clip">
      <ellipse cx="200" cy="135" rx="82" ry="70"/>
    </clipPath>
  </defs>
  <style>
    @keyframes hero-wave1 { 0%, 100% { opacity: 0.15; transform: scale(1); } 50% { opacity: 0.4; transform: scale(1.08); } }
    @keyframes hero-wave2 { 0%, 100% { opacity: 0.1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(1.12); } }
    @keyframes hero-wave3 { 0%, 100% { opacity: 0.08; transform: scale(1); } 50% { opacity: 0.2; transform: scale(1.15); } }
    @keyframes hero-core-pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.7; } }
    @keyframes hero-leg-sway { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(2deg); } }
    .hw1 { animation: hero-wave1 3s ease-in-out infinite; transform-origin: 200px 135px; }
    .hw2 { animation: hero-wave2 3s ease-in-out infinite 0.5s; transform-origin: 200px 135px; }
    .hw3 { animation: hero-wave3 3s ease-in-out infinite 1s; transform-origin: 200px 135px; }
    .hero-core { animation: hero-core-pulse 3s ease-in-out infinite; }
  </style>

  <!-- Large ambient glow -->
  <ellipse cx="200" cy="140" rx="160" ry="120" fill="url(#hero-ambient)"/>

  <!-- Sound wave arcs - left side -->
  <path d="M95 90 Q65 135 95 180" fill="none" stroke="#f59e0b" stroke-width="2" class="hw1"/>
  <path d="M80 75 Q42 135 80 195" fill="none" stroke="#fbbf24" stroke-width="1.5" class="hw2"/>
  <path d="M65 60 Q20 135 65 210" fill="none" stroke="#fbbf24" stroke-width="1" class="hw3"/>

  <!-- Sound wave arcs - right side -->
  <path d="M305 90 Q335 135 305 180" fill="none" stroke="#f59e0b" stroke-width="2" class="hw1"/>
  <path d="M320 75 Q358 135 320 195" fill="none" stroke="#fbbf24" stroke-width="1.5" class="hw2"/>
  <path d="M335 60 Q380 135 335 210" fill="none" stroke="#fbbf24" stroke-width="1" class="hw3"/>

  <!-- Sound wave arcs - top -->
  <path d="M160 60 Q200 40 240 60" fill="none" stroke="#f59e0b" stroke-width="1.5" class="hw1"/>
  <path d="M145 45 Q200 20 255 45" fill="none" stroke="#fbbf24" stroke-width="1" class="hw2"/>

  <!-- Outer glow behind body -->
  <ellipse cx="200" cy="135" rx="90" ry="78" fill="#f59e0b" opacity="0.06" filter="url(#hero-outer-glow)"/>

  <!-- Main body (spherical carapace) -->
  <ellipse cx="200" cy="135" rx="82" ry="70" fill="url(#hero-body)" stroke="#0f3460" stroke-width="1.5"/>

  <!-- Carapace texture - rocky surface lines -->
  <g clip-path="url(#hero-body-clip)" opacity="0.35">
    <path d="M130 110 Q165 95 200 100 Q235 95 270 110" fill="none" stroke="#16213e" stroke-width="1.2"/>
    <path d="M125 130 Q162 118 200 122 Q238 118 275 130" fill="none" stroke="#16213e" stroke-width="1"/>
    <path d="M128 150 Q164 140 200 143 Q236 140 272 150" fill="none" stroke="#16213e" stroke-width="1"/>
    <path d="M135 168 Q167 160 200 162 Q233 160 265 168" fill="none" stroke="#16213e" stroke-width="0.8"/>
    <!-- Vertical texture -->
    <path d="M170 70 Q168 135 172 200" fill="none" stroke="#16213e" stroke-width="0.6"/>
    <path d="M200 65 Q198 135 200 205" fill="none" stroke="#16213e" stroke-width="0.6"/>
    <path d="M230 70 Q232 135 228 200" fill="none" stroke="#16213e" stroke-width="0.6"/>
  </g>

  <!-- Inner warm glow (communication core) -->
  <ellipse cx="200" cy="130" rx="40" ry="35" fill="url(#hero-core-glow)" class="hero-core" filter="url(#hero-soft-glow)"/>

  <!-- Teal engineering accent ring -->
  <ellipse cx="200" cy="135" rx="82" ry="70" fill="none" stroke="#0d9488" stroke-width="0.6" stroke-dasharray="6 8" opacity="0.35"/>
  <ellipse cx="200" cy="135" rx="60" ry="50" fill="none" stroke="#0d9488" stroke-width="0.4" stroke-dasharray="3 6" opacity="0.2"/>

  <!-- Small teal accent dots on body -->
  <circle cx="165" cy="120" r="1.5" fill="#0d9488" opacity="0.5"/>
  <circle cx="235" cy="120" r="1.5" fill="#0d9488" opacity="0.5"/>
  <circle cx="200" cy="100" r="1.5" fill="#0d9488" opacity="0.5"/>
  <circle cx="180" cy="155" r="1.2" fill="#0d9488" opacity="0.4"/>
  <circle cx="220" cy="155" r="1.2" fill="#0d9488" opacity="0.4"/>

  <!-- FIVE LEGS - "Jazz Hands" welcoming pose (legs raised and splayed) -->

  <!-- Leg 1 - Far left, raised high (jazz hands!) -->
  <g>
    <path d="M135 175 Q105 195 75 185 Q65 182 55 190" fill="none" stroke="url(#hero-leg-grad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Gripper/hand segments -->
    <path d="M55 190 L48 185" fill="none" stroke="#1a1a2e" stroke-width="3" stroke-linecap="round"/>
    <path d="M55 190 L46 192" fill="none" stroke="#1a1a2e" stroke-width="3" stroke-linecap="round"/>
    <path d="M55 190 L50 198" fill="none" stroke="#1a1a2e" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Leg 2 - Left, raised slightly -->
  <g>
    <path d="M148 190 Q120 230 95 250 Q85 258 78 265" fill="none" stroke="url(#hero-leg-grad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M78 265 L70 260" fill="none" stroke="#1a1a2e" stroke-width="3" stroke-linecap="round"/>
    <path d="M78 265 L72 270" fill="none" stroke="#1a1a2e" stroke-width="3" stroke-linecap="round"/>
    <path d="M78 265 L80 273" fill="none" stroke="#1a1a2e" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Leg 3 - Center bottom, grounded -->
  <g>
    <path d="M200 200 Q200 250 200 290 Q200 300 198 308" fill="none" stroke="url(#hero-leg-grad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M198 308 L190 305" fill="none" stroke="#1a1a2e" stroke-width="3" stroke-linecap="round"/>
    <path d="M198 308 L200 316" fill="none" stroke="#1a1a2e" stroke-width="3" stroke-linecap="round"/>
    <path d="M198 308 L206 306" fill="none" stroke="#1a1a2e" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Leg 4 - Right, raised slightly -->
  <g>
    <path d="M252 190 Q280 230 305 250 Q315 258 322 265" fill="none" stroke="url(#hero-leg-grad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M322 265 L330 260" fill="none" stroke="#1a1a2e" stroke-width="3" stroke-linecap="round"/>
    <path d="M322 265 L328 270" fill="none" stroke="#1a1a2e" stroke-width="3" stroke-linecap="round"/>
    <path d="M322 265 L320 273" fill="none" stroke="#1a1a2e" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Leg 5 - Far right, raised high (jazz hands!) -->
  <g>
    <path d="M265 175 Q295 195 325 185 Q335 182 345 190" fill="none" stroke="url(#hero-leg-grad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M345 190 L352 185" fill="none" stroke="#1a1a2e" stroke-width="3" stroke-linecap="round"/>
    <path d="M345 190 L354 192" fill="none" stroke="#1a1a2e" stroke-width="3" stroke-linecap="round"/>
    <path d="M345 190 L350 198" fill="none" stroke="#1a1a2e" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Subtle shadow beneath -->
  <ellipse cx="200" cy="320" rx="100" ry="8" fill="#0f172a" opacity="0.4"/>
</svg>
